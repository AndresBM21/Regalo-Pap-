<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Papá!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-handwriting { font-family: 'Caveat', cursive; }
        
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-gradient {
            background: linear-gradient(-45deg, #f8fafc, #fff1f2, #f0f9ff, #fdf2f8);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(10deg); }
            66% { transform: translate(-20px, -20px) rotate(-10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-drift { animation: drift 15s ease-in-out infinite; }
        .animate-beat { animation: beat 1.5s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        
        .perspective-1000 { perspective: 1000px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f43f5e; border-radius: 10px; }

        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="animate-gradient min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                camera: (
                    <>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </>
                ),
                layout: (
                    <>
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </>
                ),
                grid: (
                    <>
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
                    </>
                ),
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                music: (
                    <>
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </>
                ),
                play: <path d="m7 4 12 8-12 8V4z"/>,
                pause: <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.heart}
                </svg>
            );
        };

        const App = () => {
            const [layout, setLayout] = useState('polaroid');
            const [isVisible, setIsVisible] = useState(false);
            const [quoteIdx, setQuoteIdx] = useState(0);
            const [selectedImgIdx, setSelectedImgIdx] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const audioRef = useRef(null);

            const quotes = [
                "¡Eres el mejor ejemplo a seguir!",
                "Gracias por cada aventura compartida.",
                "Que este año sea el más increíble de todos.",
                "Tu alegría ilumina a toda la familia.",
                "¡Salud por muchos años más, Papá!"
            ];

            const images = [
                { id: 1, src: "img/FOTO CON EL PRIMO.jpg", alt: "Noche en Chiapas" },
                { id: 2, src: "img/IGLESIA.jpg", alt: "Con tus papás" },
                { id: 3, src: "img/EN TIERRA SANTA.jpg", alt: "Viajes inolvidables" },
                { id: 4, src: "img/CHIAPAS_MOM.jpg", alt: "Con tu Amorcito" },
                { id: 5, src: "img/CON MI AMA.jpg", alt: "Cena Linda" },
                { id: 6, src: "img/ABAJO DEL PUENTE.jpg", alt: "Abajo del puente" },
                { id: 7, src: "img/CON NOSOTROS AÑOS ATRAS.jpg", alt: "Recuerdos de infancia" },
                { id: 8, src: "img/QUINCE DE YAYA.jpg", alt: "Los Quince de Silvita" },
                { id: 9, src: "img/CHIAPAS.jpg", alt: "En el Cañón del Sumidero " },
                { id: 10, src: "img/DÍA DEL PADRE.jpg", alt: "Tus bodoquitos" }
            ];

            const backgroundElements = useMemo(() => {
                const heartColors = ['text-red-300', 'text-rose-400', 'text-pink-300', 'text-red-200'];
                return [...Array(20)].map((_, i) => {
                    const isPhoto = i % 5 === 0;
                    return {
                        id: i,
                        left: `${Math.random() * 100}%`,
                        top: `${Math.random() * 100}%`,
                        delay: `${Math.random() * -20}s`,
                        duration: `${Math.random() * 10 + 15}s`,
                        size: isPhoto ? Math.random() * 40 + 40 : Math.random() * 15 + 10,
                        color: heartColors[i % heartColors.length],
                        type: isPhoto ? 'photo' : 'heart',
                        imgSrc: images[i % images.length].src,
                        rotation: `${Math.random() * 360}deg`
                    };
                });
            }, []);

            useEffect(() => {
                setIsVisible(true);
                const interval = setInterval(() => {
                    setQuoteIdx((prev) => (prev + 1) % quotes.length);
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            const toggleMusic = () => {
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    // Intenta reproducir el audio. Nota: asegúrate de subir el archivo 'mananitas.mp3' a tu repo.
                    audioRef.current.play().catch(e => {
                        console.log("Para escuchar la música, asegúrate de haber subido el archivo mananitas.mp3");
                    });
                }
                setIsPlaying(!isPlaying);
            };

            const showNext = useCallback((e) => {
                e?.stopPropagation();
                setSelectedImgIdx(prev => (prev + 1) % images.length);
            }, [images.length]);

            const showPrev = useCallback((e) => {
                e?.stopPropagation();
                setSelectedImgIdx(prev => (prev - 1 + images.length) % images.length);
            }, [images.length]);

            const closeLightbox = () => setSelectedImgIdx(null);

            const LayoutButton = ({ id, icon, label }) => (
                <button
                    onClick={() => {
                        setIsVisible(false);
                        setTimeout(() => {
                            setLayout(id);
                            setIsVisible(true);
                        }, 300);
                    }}
                    className={`flex items-center gap-2 px-6 py-2 rounded-full transition-all duration-300 transform glass ${
                        layout === id 
                        ? 'bg-rose-500 text-white shadow-xl scale-110 !border-rose-300' 
                        : 'text-slate-600 hover:bg-white shadow-sm'
                    }`}
                >
                    <Icon name={icon} size={18} className={layout === id ? 'animate-pulse' : ''} />
                    <span className="font-medium">{label}</span>
                </button>
            );

            return (
                <div className="relative min-h-screen p-4 md:p-8 font-sans overflow-x-hidden">
                    
                    {/* Archivo de audio: Asegúrate de subir 'mananitas.mp3' a la misma carpeta que este index.html */}
                    <audio 
                        ref={audioRef} 
                        src="mananitas.mp3" 
                        loop
                    />

                    {/* FONDO DE AMBIENTACIÓN */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                        {backgroundElements.map(el => (
                            <div 
                                key={el.id} 
                                className="absolute animate-drift opacity-[0.15]" 
                                style={{ 
                                    left: el.left, 
                                    top: el.top, 
                                    animationDelay: el.delay,
                                    animationDuration: el.duration
                                }}
                            >
                                {el.type === 'photo' ? (
                                    <div 
                                        className="rounded-lg overflow-hidden border-2 border-white/50 shadow-md grayscale-[30%]"
                                        style={{ width: el.size, height: el.size, transform: `rotate(${el.rotation})` }}
                                    >
                                        <img src={el.imgSrc} className="w-full h-full object-cover" />
                                    </div>
                                ) : (
                                    <Icon 
                                        name="heart" 
                                        size={el.size} 
                                        className={`${el.color} fill-current`} 
                                        style={{ transform: `rotate(${el.rotation})` }} 
                                    />
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="relative z-10">
                        <header className={`max-w-6xl mx-auto text-center mb-10 transition-all duration-1000 ${isVisible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                            <div className="inline-block glass text-rose-600 px-4 py-1 rounded-full text-xs font-bold tracking-widest uppercase mb-4 shadow-sm border-rose-100">
                                Para el mejor papá del mundo
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black text-slate-800 mb-4 tracking-tight">
                                ¡Feliz <span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-indigo-600">Cumpleaños</span>!
                            </h1>
                            
                            <div className="flex flex-wrap justify-center gap-4 mt-8">
                                <LayoutButton id="polaroid" icon="camera" label="Muro Mágico" />
                                <LayoutButton id="mosaic" icon="layout" label="Mosaico" />
                                <LayoutButton id="grid" icon="grid" label="Galería" />
                            </div>
                        </header>

                        <main className={`max-w-6xl mx-auto transition-all duration-500 transform ${isVisible ? 'scale-100 opacity-100' : 'scale-95 opacity-0'}`}>
                            
                            {layout === 'polaroid' && (
                                <div className="relative h-full min-h-[600px] flex flex-wrap justify-center items-center gap-6 py-10 perspective-1000">
                                    {images.map((img, idx) => (
                                        <div 
                                            key={img.id} 
                                            onClick={() => setSelectedImgIdx(idx)}
                                            className="bg-white p-3 pb-10 shadow-2xl transform transition-all duration-500 hover:scale-110 hover:z-40 cursor-zoom-in group active:scale-95 border border-gray-100"
                                            style={{ transform: `rotate(${idx % 2 === 0 ? (idx + 1) * 2.5 : (idx + 1) * -2.5}deg)`, maxWidth: '210px' }}>
                                            <div className="overflow-hidden bg-gray-50 aspect-square mb-4">
                                                <img src={img.src} alt={img.alt} className="w-full h-full object-cover transition-all" />
                                            </div>
                                            <p className="text-center font-handwriting text-gray-700 text-2xl leading-none">{img.alt}</p>
                                        </div>
                                    ))}
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none text-center">
                                        <div className="glass shadow-2xl border-2 !border-rose-500 text-rose-600 px-10 py-5 rounded-3xl inline-block transform -rotate-3 scale-110">
                                            <Icon name="heart" size={40} className="mx-auto mb-2 animate-beat text-rose-500 fill-rose-500" />
                                            <span className="text-4xl font-black italic block">¡TE AMAMOS!</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {layout === 'mosaic' && (
                                <div className="grid grid-cols-4 md:grid-cols-6 gap-3 h-[700px] rounded-3xl overflow-hidden glass p-3 shadow-inner">
                                    <div className="col-span-2 row-span-4 relative group overflow-hidden rounded-2xl cursor-zoom-in" onClick={() => setSelectedImgIdx(6)}>
                                        <img src={images[6].src} className="w-full h-full object-cover transition-transform group-hover:scale-105" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-rose-900/80 via-transparent p-8 text-white flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                                            <h2 className="text-3xl font-bold">Nuestro Héroe</h2>
                                        </div>
                                    </div>
                                    <div className="col-span-2 row-span-1 bg-gradient-to-br from-rose-500 to-indigo-600 rounded-2xl flex items-center justify-center p-6 text-white text-center shadow-lg">
                                        <p className="text-2xl font-handwriting italic">"{quotes[quoteIdx]}"</p>
                                    </div>
                                    {images.slice(0, 7).map((img, i) => (
                                        <div key={i} onClick={() => setSelectedImgIdx(i)} className="col-span-1 row-span-1 overflow-hidden rounded-2xl group cursor-zoom-in relative">
                                            <img src={img.src} className="w-full h-full object-cover transition-all group-hover:scale-110" />
                                            <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                <Icon name="camera" size={24} className="text-white" />
                                            </div>
                                        </div>
                                    ))}
                                    <div className="col-span-2 row-span-1 bg-white/50 rounded-2xl flex items-center justify-center shadow-md border border-white/40">
                                        <span className="font-bold text-slate-800 tracking-widest uppercase text-sm">Familia Unida</span>
                                    </div>
                                </div>
                            )}

                            {layout === 'grid' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                        {images.map((img, idx) => (
                                            <div 
                                                key={img.id} 
                                                onClick={() => setSelectedImgIdx(idx)}
                                                className="group relative aspect-[3/4] rounded-2xl overflow-hidden shadow-lg border-4 border-white cursor-zoom-in hover:shadow-2xl transition-all active:scale-95">
                                                <img src={img.src} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                                    <p className="text-white text-xs font-medium">{img.alt}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>

                        <footer className="max-w-6xl mx-auto mt-16 flex flex-col md:flex-row justify-between items-center border-t border-black/5 pt-8 text-slate-500 gap-4 mb-8">
                            <div className="flex items-center gap-2 glass px-4 py-2 rounded-full shadow-sm">
                                <Icon name="heart" size={20} className="text-rose-500 fill-rose-500 animate-beat" />
                                <p className="font-medium text-sm">Hecho con amor por toda tu familia</p>
                            </div>
                        </footer>
                    </div>

                    {/* BOTÓN FLOTANTE DE MÚSICA */}
                    <div className="fixed bottom-8 right-8 z-50 flex flex-col items-center gap-2">
                        <div className={`glass px-3 py-1 rounded-full text-[10px] font-bold text-rose-600 shadow-sm transition-opacity duration-500 ${isPlaying ? 'opacity-100' : 'opacity-0'}`}>
                            Pedro Infante - Las Mañanitas
                        </div>
                        <button 
                            onClick={toggleMusic}
                            className={`w-16 h-16 rounded-full flex items-center justify-center shadow-2xl transition-all duration-500 transform hover:scale-110 active:scale-90 border-4 border-white ${isPlaying ? 'bg-rose-500 text-white animate-spin-slow' : 'bg-white text-rose-500'}`}
                            title={isPlaying ? "Pausar música" : "Reproducir Las Mañanitas"}
                        >
                            <Icon name={isPlaying ? "pause" : "play"} size={28} />
                        </button>
                    </div>

                    {/* LIGHTBOX */}
                    {selectedImgIdx !== null && (
                        <div 
                            className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center animate-in fade-in duration-300 p-4"
                            onClick={closeLightbox}
                        >
                            <button className="absolute top-6 right-6 text-white/70 hover:text-white p-2">
                                <Icon name="x" size={40} />
                            </button>

                            <button onClick={showPrev} className="absolute left-4 md:left-10 text-white/50 hover:text-white bg-white/10 rounded-full p-4 transition-all">
                                <Icon name="chevronLeft" size={48} />
                            </button>

                            <div className="relative max-w-5xl w-full h-full flex flex-col items-center justify-center" onClick={e => e.stopPropagation()}>
                                <img 
                                    src={images[selectedImgIdx].src} 
                                    className="max-h-[75vh] max-w-full object-contain rounded-lg shadow-2xl animate-in zoom-in-95 duration-300"
                                    alt={images[selectedImgIdx].alt}
                                />
                                <div className="mt-6 text-center text-white">
                                    <p className="text-4xl font-handwriting mb-2 tracking-wide">{images[selectedImgIdx].alt}</p>
                                    <p className="text-white/40 text-sm tracking-widest uppercase">
                                        {selectedImgIdx + 1} de {images.length}
                                    </p>
                                </div>
                            </div>

                            <button onClick={showNext} className="absolute right-4 md:right-10 text-white/50 hover:text-white bg-white/10 rounded-full p-4 transition-all">
                                <Icon name="chevronRight" size={48} />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
