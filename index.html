<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Papá!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-handwriting { font-family: 'Caveat', cursive; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-beat { animation: beat 1.5s ease-in-out infinite; }
        .perspective-1000 { perspective: 1000px; }
        
        /* Estilo para el scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Componente de Iconos SVG para evitar dependencias externas lentas
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                camera: (
                    <>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </>
                ),
                layout: (
                    <>
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </>
                ),
                grid: (
                    <>
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
                    </>
                ),
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                music: (
                    <>
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [layout, setLayout] = useState('polaroid');
            const [isVisible, setIsVisible] = useState(false);
            const [quoteIdx, setQuoteIdx] = useState(0);
            const [selectedImgIdx, setSelectedImgIdx] = useState(null);

            const quotes = [
                "¡Eres el mejor ejemplo a seguir!",
                "Gracias por cada aventura compartida.",
                "Que este año sea el más increíble de todos.",
                "Tu alegría ilumina a toda la familia.",
                "¡Salud por muchos años más, Papá!"
            ];

            const images = [
                { id: 1, src: "img/FOTO CON EL PRIMO.jpg", alt: "Noche en Chiapas" },
                { id: 2, src: "img/IGLESIA.jpg", alt: "Con tus papás" },
                { id: 3, src: "img/EN TIERRA SANTA.jpg", alt: "Viajes inolvidables" },
                { id: 4, src: "img/CHIAPAS_MOM.jpg", alt: "Con tu Amorcito" },
                { id: 5, src: "img/CON MI AMA.jpg", alt: "Cena Linda" },
                { id: 6, src: "img/ABAJO DEL PUENTE.jpg", alt: "Abajo del puente" },
                { id: 7, src: "img/CON NOSOTROS AÑOS ATRAS.jpg", alt: "Recuerdos de infancia" },
                { id: 8, src: "img/QUINCE DE YAYA.jpg", alt: "Los Quince de Silvita" },
                { id: 9, src: "img/CHIAPAS.jpg", alt: "En el Cañón del Sumidero " },
                { id: 10, src: "img/DÍA DEL PADRE.jpg", alt: "Tus bodoquitos" }
            ];

            useEffect(() => {
                setIsVisible(true);
                const interval = setInterval(() => {
                    setQuoteIdx((prev) => (prev + 1) % quotes.length);
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            // Navegación del Lightbox
            const showNext = useCallback((e) => {
                e?.stopPropagation();
                setSelectedImgIdx(prev => (prev + 1) % images.length);
            }, [images.length]);

            const showPrev = useCallback((e) => {
                e?.stopPropagation();
                setSelectedImgIdx(prev => (prev - 1 + images.length) % images.length);
            }, [images.length]);

            const closeLightbox = () => setSelectedImgIdx(null);

            // Teclado
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (selectedImgIdx === null) return;
                    if (e.key === 'ArrowRight') showNext();
                    if (e.key === 'ArrowLeft') showPrev();
                    if (e.key === 'Escape') closeLightbox();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedImgIdx, showNext, showPrev]);

            const LayoutButton = ({ id, icon, label }) => (
                <button
                    onClick={() => {
                        setIsVisible(false);
                        setTimeout(() => {
                            setLayout(id);
                            setIsVisible(true);
                        }, 300);
                    }}
                    className={`flex items-center gap-2 px-6 py-2 rounded-full transition-all duration-300 transform ${
                        layout === id 
                        ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-xl scale-110' 
                        : 'bg-white text-gray-600 hover:bg-gray-100 shadow-sm'
                    }`}
                >
                    <Icon name={icon} size={18} className={layout === id ? 'animate-pulse' : ''} />
                    <span className="font-medium">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans overflow-x-hidden relative">
                    {/* Fondo decorativo */}
                    <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-20">
                        {[...Array(12)].map((_, i) => (
                            <div key={i} className="absolute animate-float" style={{ left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 5}s` }}>
                                <Icon name="sparkles" size={Math.random() * 30 + 15} className="text-blue-400" />
                            </div>
                        ))}
                    </div>

                    <header className={`max-w-6xl mx-auto text-center mb-10 transition-all duration-1000 ${isVisible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                        <div className="inline-block bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold tracking-widest uppercase mb-4">Para el mejor papá del mundo</div>
                        <h1 className="text-5xl md:text-7xl font-black text-slate-800 mb-4 tracking-tight">
                            ¡Feliz <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-500">Cumpleaños</span>!
                        </h1>
                        
                        <div className="flex flex-wrap justify-center gap-4 mt-8">
                            <LayoutButton id="polaroid" icon="camera" label="Muro Mágico" />
                            <LayoutButton id="mosaic" icon="layout" label="Mosaico" />
                            <LayoutButton id="grid" icon="grid" label="Galería" />
                        </div>
                    </header>

                    <main className={`max-w-6xl mx-auto transition-all duration-500 transform ${isVisible ? 'scale-100 opacity-100' : 'scale-95 opacity-0'}`}>
                        
                        {/* VISTA POLAROID */}
                        {layout === 'polaroid' && (
                            <div className="relative h-full min-h-[600px] flex flex-wrap justify-center items-center gap-6 py-10 perspective-1000">
                                {images.map((img, idx) => (
                                    <div 
                                        key={img.id} 
                                        onClick={() => setSelectedImgIdx(idx)}
                                        className="bg-white p-3 pb-8 shadow-xl transform transition-all duration-500 hover:scale-110 hover:z-40 cursor-zoom-in group active:scale-95"
                                        style={{ transform: `rotate(${idx % 2 === 0 ? (idx + 1) * 2 : (idx + 1) * -2}deg)`, maxWidth: '200px' }}>
                                        <div className="overflow-hidden bg-gray-100 aspect-square mb-3">
                                            <img src={img.src} alt={img.alt} className="w-full h-full object-cover" onError={(e) => e.target.src='https://via.placeholder.com/400?text=Recuerdo+Papá'} />
                                        </div>
                                        <p className="text-center font-handwriting text-gray-700 text-xl">{img.alt}</p>
                                    </div>
                                ))}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-none text-center">
                                    <div className="bg-white/80 backdrop-blur-md shadow-2xl border-2 border-red-500 text-red-600 px-8 py-4 rounded-2xl inline-block transform -rotate-3">
                                        <Icon name="heart" size={32} className="mx-auto mb-2 animate-beat text-red-500 fill-red-500" />
                                        <span className="text-3xl font-black italic block">¡TE AMAMOS!</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VISTA MOSAICO */}
                        {layout === 'mosaic' && (
                            <div className="grid grid-cols-4 md:grid-cols-6 gap-3 h-[700px] rounded-3xl overflow-hidden bg-slate-200 p-3 shadow-inner">
                                <div className="col-span-2 row-span-4 relative group overflow-hidden rounded-2xl cursor-zoom-in" onClick={() => setSelectedImgIdx(6)}>
                                    <img src={images[6].src} className="w-full h-full object-cover transition-transform group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-blue-900/80 via-transparent p-8 text-white flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                                        <h2 className="text-3xl font-bold">Nuestro Héroe</h2>
                                    </div>
                                </div>
                                <div className="col-span-2 row-span-1 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center p-6 text-white text-center shadow-lg">
                                    <p className="text-2xl font-handwriting italic">"{quotes[quoteIdx]}"</p>
                                </div>
                                {images.slice(0, 7).map((img, i) => (
                                    <div key={i} onClick={() => setSelectedImgIdx(i)} className="col-span-1 row-span-1 overflow-hidden rounded-2xl group cursor-zoom-in relative">
                                        <img src={img.src} className="w-full h-full object-cover transition-all group-hover:scale-110" />
                                        <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <Icon name="camera" size={24} className="text-white" />
                                        </div>
                                    </div>
                                ))}
                                <div className="col-span-2 row-span-1 bg-white rounded-2xl flex items-center justify-center shadow-md">
                                    <span className="font-bold text-slate-800 tracking-widest uppercase text-sm">Familia Unida</span>
                                </div>
                            </div>
                        )}

                        {/* VISTA GRID */}
                        {layout === 'grid' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                    {images.map((img, idx) => (
                                        <div 
                                            key={img.id} 
                                            onClick={() => setSelectedImgIdx(idx)}
                                            className="group relative aspect-[3/4] rounded-2xl overflow-hidden shadow-lg border-4 border-white cursor-zoom-in hover:shadow-2xl transition-all active:scale-95">
                                            <img src={img.src} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                                <p className="text-white text-xs font-medium">{img.alt}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white rounded-3xl p-8 shadow-sm flex flex-col md:flex-row items-center gap-8 border border-slate-100">
                                    <div className="w-20 h-20 rounded-2xl bg-blue-600 flex items-center justify-center text-white shadow-lg rotate-3"><Icon name="music" size={40} /></div>
                                    <div className="text-center md:text-left">
                                        <h3 className="text-3xl font-bold text-slate-800 mb-2">Para el mejor del mundo</h3>
                                        <p className="text-slate-600 text-lg">Papá, hoy celebramos tu vida. Gracias por ser nuestro pilar, nuestro guía y por cada risa que nos regalas a diario. ¡Te mereces todo!</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* LIGHTBOX / VISOR DE IMÁGENES */}
                    {selectedImgIdx !== null && (
                        <div 
                            className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-sm flex items-center justify-center animate-in fade-in duration-300 p-4"
                            onClick={closeLightbox}
                        >
                            {/* Botón Cerrar */}
                            <button className="absolute top-6 right-6 text-white/70 hover:text-white transition-colors p-2 z-10">
                                <Icon name="x" size={40} />
                            </button>

                            {/* Botón Anterior */}
                            <button 
                                onClick={showPrev}
                                className="absolute left-4 md:left-10 text-white/50 hover:text-white bg-white/10 hover:bg-white/20 rounded-full p-4 transition-all"
                            >
                                <Icon name="chevronLeft" size={48} />
                            </button>

                            {/* Contenedor Imagen */}
                            <div className="relative max-w-5xl w-full h-full flex flex-col items-center justify-center" onClick={e => e.stopPropagation()}>
                                <div className="relative group w-full flex justify-center items-center">
                                    <img 
                                        src={images[selectedImgIdx].src} 
                                        className="max-h-[80vh] max-w-full object-contain rounded-lg shadow-2xl animate-in zoom-in-95 duration-300"
                                        alt={images[selectedImgIdx].alt}
                                    />
                                </div>
                                <div className="mt-6 text-center text-white">
                                    <p className="text-2xl font-handwriting mb-2">{images[selectedImgIdx].alt}</p>
                                    <p className="text-white/40 text-sm tracking-widest uppercase">
                                        {selectedImgIdx + 1} de {images.length}
                                    </p>
                                </div>
                            </div>

                            {/* Botón Siguiente */}
                            <button 
                                onClick={showNext}
                                className="absolute right-4 md:right-10 text-white/50 hover:text-white bg-white/10 hover:bg-white/20 rounded-full p-4 transition-all"
                            >
                                <Icon name="chevronRight" size={48} />
                            </button>
                        </div>
                    )}

                    <footer className="max-w-6xl mx-auto mt-16 flex flex-col md:flex-row justify-between items-center border-t border-slate-200 pt-8 text-slate-400 gap-4 mb-8">
                        <div className="flex items-center gap-2">
                            <Icon name="heart" size={20} className="text-blue-500" />
                            <p className="font-medium">Hecho con amor por toda tu familia</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
