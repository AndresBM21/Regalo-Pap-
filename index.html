<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Papá!</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para traducir el código JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-handwriting { font-family: 'Caveat', cursive; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .animate-float { animation: float 6s linear infinite; }
        .animate-beat { animation: beat 1.5s ease-in-out infinite; }
        .perspective-1000 { perspective: 1000px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Simulación de los iconos de Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [layout, setLayout] = useState('polaroid');
            const [isVisible, setIsVisible] = useState(false);
            const [quoteIdx, setQuoteIdx] = useState(0);

            const quotes = [
                "¡Eres el mejor ejemplo a seguir!",
                "Gracias por cada aventura compartida.",
                "Que este año sea el más increíble de todos.",
                "Tu alegría ilumina a toda la familia.",
                "¡Salud por muchos años más, Papá!"
            ];

            useEffect(() => {
                setIsVisible(true);
                const interval = setInterval(() => {
                    setQuoteIdx((prev) => (prev + 1) % quotes.length);
                }, 4000);
                lucide.createIcons();
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [layout, isVisible]);

            const images = [
                { id: 1, src: "img/FOTO CON EL PRIMO.jpg", alt: "Noche de amigos" },
                { id: 2, src: "img/IGLESIA.jpg", alt: "Frente a la cruz" },
                { id: 3, src: "img/EN TIERRA SANTA.jpg", alt: "En el balcón" },
                { id: 4, src: "img/CHIAPAS_MOM.jpg", alt: "Abrazo por la ventana" },
                { id: 5, src: "img/CON MI AMA.jpg", alt: "Cena nocturna" },
                { id: 6, src: "img/ABAJO DEL PUENTE.jpg", alt: "Cena bajo palapa" },
                { id: 7, src: "img/CON NOSOTROS AÑOS ATRAS.jpg", alt: "Papá e hijos" },
                { id: 8, src: "img/QUINCE DE YAYA.jpg", alt: "Baile en salón" },
                { id: 9, src: "img/CHIAPAS.jpg", alt: "En la lancha" },
                { id: 10, src: "img/DÍA DEL PADRE.jpg", alt: "Selfie familiar" }
            ];

            const LayoutButton = ({ id, icon, label }) => (
                <button
                    onClick={() => {
                        setIsVisible(false);
                        setTimeout(() => {
                            setLayout(id);
                            setIsVisible(true);
                        }, 300);
                    }}
                    className={`flex items-center gap-2 px-6 py-2 rounded-full transition-all duration-300 transform ${
                        layout === id 
                        ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-xl scale-110' 
                        : 'bg-white text-gray-600 hover:bg-gray-100'
                    }`}
                >
                    <Icon name={icon} size={18} className={layout === id ? 'animate-bounce' : ''} />
                    <span className="font-medium">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans overflow-x-hidden relative">
                    <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-20">
                        {[...Array(15)].map((_, i) => (
                            <div key={i} className="absolute animate-float" style={{ left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 5}s` }}>
                                <Icon name="sparkles" size={Math.random() * 30 + 10} className="text-blue-400" />
                            </div>
                        ))}
                    </div>

                    <header className={`max-w-6xl mx-auto text-center mb-10 transition-all duration-1000 ${isVisible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                        <div className="inline-block bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold tracking-widest uppercase mb-4">Especial para ti</div>
                        <h1 className="text-5xl md:text-6xl font-black text-slate-800 mb-4 tracking-tight">
                            ¡Feliz <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-500">Cumpleaños</span>, Papá!
                        </h1>
                        <div className="flex flex-wrap justify-center gap-4 mt-8">
                            <LayoutButton id="polaroid" icon="camera" label="Muro Mágico" />
                            <LayoutButton id="mosaic" icon="layout" label="Mosaico Dinámico" />
                            <LayoutButton id="grid" icon="grid" label="Galería Pro" />
                        </div>
                    </header>

                    <main className={`max-w-6xl mx-auto transition-all duration-500 transform ${isVisible ? 'scale-100 opacity-100' : 'scale-95 opacity-0'}`}>
                        {layout === 'polaroid' && (
                            <div className="relative h-full min-h-[650px] flex flex-wrap justify-center items-center gap-4 py-10 perspective-1000">
                                {images.map((img, idx) => (
                                    <div key={img.id} className="bg-white p-3 pb-8 shadow-2xl transform transition-all duration-500 hover:scale-125 hover:z-50 cursor-pointer group"
                                        style={{ transform: `rotate(${idx % 2 === 0 ? (idx + 1) * 3 : (idx + 1) * -3}deg)`, maxWidth: '180px' }}>
                                        <div className="overflow-hidden bg-gray-200 aspect-square mb-3">
                                            <img src={img.src} alt={img.alt} className="w-full h-full object-cover" onError={(e) => e.target.src='https://via.placeholder.com/300?text=Papá'} />
                                        </div>
                                        <p className="text-center font-handwriting text-gray-700 text-lg">{img.alt}</p>
                                    </div>
                                ))}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none w-full text-center">
                                    <div className="bg-white/90 backdrop-blur shadow-2xl border-2 border-red-500 text-red-600 px-10 py-6 rounded-2xl inline-block">
                                        <Icon name="heart" size={40} className="mx-auto mb-2 animate-beat text-red-500" />
                                        <span className="text-4xl font-black italic block">¡TE AMAMOS!</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {layout === 'mosaic' && (
                            <div className="grid grid-cols-4 md:grid-cols-6 gap-2 h-[700px] rounded-3xl overflow-hidden bg-slate-200 p-2">
                                <div className="col-span-2 row-span-4 relative group overflow-hidden rounded-2xl">
                                    <img src={images[6].src} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-blue-900/80 p-8 text-white flex flex-col justify-end">
                                        <h2 className="text-4xl font-bold mb-2">Nuestro Héroe</h2>
                                    </div>
                                </div>
                                <div className="col-span-2 row-span-1 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center p-4 text-white text-center">
                                    <p className="text-xl font-handwriting italic">"{quotes[quoteIdx]}"</p>
                                </div>
                                {images.slice(0, 5).map((img, i) => (
                                    <div key={i} className="col-span-1 row-span-1 overflow-hidden rounded-2xl group">
                                        <img src={img.src} className="w-full h-full object-cover transition-all group-hover:scale-110" />
                                    </div>
                                ))}
                                <div className="col-span-2 row-span-1 bg-white rounded-2xl flex items-center justify-center shadow-md">
                                    <span className="font-bold text-slate-800">Celebración 2024</span>
                                </div>
                            </div>
                        )}

                        {layout === 'grid' && (
                            <div className="space-y-8 p-4">
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-6">
                                    {images.map((img) => (
                                        <div key={img.id} className="group relative aspect-[3/4] rounded-2xl overflow-hidden shadow-xl border-2 border-white">
                                            <img src={img.src} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white rounded-3xl p-8 shadow-sm flex items-center gap-8">
                                    <div className="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white"><Icon name="music" size={32} /></div>
                                    <div>
                                        <h3 className="text-3xl font-serif text-slate-800 mb-2">Para el mejor del mundo</h3>
                                        <p className="text-slate-600">Papá, hoy celebramos tu vida. Gracias por ser nuestro pilar y por cada risa compartida.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="max-w-6xl mx-auto mt-12 flex justify-between items-center border-t pt-8 text-slate-400">
                        <div className="flex items-center gap-2">
                            <Icon name="sparkles" size={20} className="text-blue-400" />
                            <p>Tu familia te desea lo mejor</p>
                        </div>
                        <div className="flex gap-4">
                            <button className="px-4 py-2 bg-blue-600 rounded-xl text-white text-sm">Descargar Álbum</button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
